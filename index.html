<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Cosmic Wish | Happy Birthday! ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020205;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .interaction-gate {
            position: relative;
            z-index: 3;
            text-align: center;
            transition: opacity 1s ease, transform 1s ease;
        }

        .start-btn {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 32px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 40px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        .start-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 30px rgba(255, 150, 200, 0.5);
            transform: scale(1.03);
        }

        .overlay {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 90%;
            max-width: 500px;
            pointer-events: none;
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
        }

        h1 {
            font-weight: 300;
            font-size: 2.8rem;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ffdeee, #ffffff, #e1bfff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 192, 203, 0.3);
        }

        p {
            font-weight: 400;
            font-size: 1.15rem;
            line-height: 1.7;
            color: #e2e8f0;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body>

    <!-- 🎵 AUDIO FILE: Change 'your-audio-file.mp3' to your music file name -->
    <audio id="birthdayTrack" preload="auto">
        <source src="audio-1784429183439.mp3" type="audio/mpeg">
    </audio>

    <canvas id="cosmicCanvas"></canvas>

    <div class="interaction-gate" id="gate">
        <button class="start-btn" onclick="revealWish()">Tap to Unveil the Wish</button>
    </div>

    <div class="overlay" id="messageContainer">
        <h1>Happy Birthday my Nia!</h1>
        <p id="sub-message">Hope you have an absolutely amazing day! Saranghae</p>
    </div>

    <script>
        const audio = document.getElementById('birthdayTrack');
        const gate = document.getElementById('gate');
        const container = document.getElementById('messageContainer');

        function revealWish() {
            gate.style.opacity = '0';
            gate.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                gate.style.display = 'none';
                container.style.display = 'block';
                setTimeout(() => { container.style.opacity = '1'; }, 50);
                
                // Play song at 35 seconds
                audio.currentTime = 35;
                audio.volume = 0.8;
                audio.play();

                // Stop and fade out after 8 seconds (at 43 seconds)
                setTimeout(() => {
                    let fadeOutInterval = setInterval(() => {
                        if (audio.volume > 0.05) {
                            audio.volume -= 0.05;
                        } else {
                            clearInterval(fadeOutInterval);
                            audio.pause();
                        }
                    }, 50);
                }, 8000);

            }, 500);
        }

        // --- VISUALS ENGINE: GALAXY BACKDROP + INTERTWINED HEART PARTICLES ---
        const canvas = document.getElementById('cosmicCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, backgroundStars = [], heartParticles = [], nebulaGradient;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Rich space background color gradient
            nebulaGradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height));
            nebulaGradient.addColorStop(0, '#110924'); 
            nebulaGradient.addColorStop(0.4, '#040416');
            nebulaGradient.addColorStop(1, '#010103');

            initCosmos();
        }

        // Mathematical formula for a classic sleek heart path
        function getHeartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
            };
        }

        class BackgroundStar {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.2;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.factor = Math.random() * 0.03 + 0.01;
            }
            draw() {
                this.opacity += Math.sin(Date.now() * this.factor) * 0.01;
                ctx.fillStyle = `rgba(220, 230, 255, ${Math.max(0.1, this.opacity)})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class HeartParticle {
            constructor(angle) {
                this.angle = angle;
                this.baseSize = Math.random() * 1.5 + 0.5;
                this.speed = 0.02 + Math.random() * 0.03;
                
                // Cosmic dust colors: space pinks, warm lavenders, and stellar blues
                const colors = ['#ff75a0', '#fca3cc', '#c39eff', '#94b3ff'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // Explode out into chaos initially, then pull together like gravity
                this.x = Math.random() * width;
                this.y = Math.random() * height;
            }

            update() {
                // Determine cosmic layout sizing dynamically based on window size
                const scale = Math.min(width, height) / 28;
                const point = getHeartPoint(this.angle);
                
                // Add a gentle floating nebula drift effect over time
                const driftX = Math.sin(Date.now() * 0.001 + this.angle) * 8;
                const driftY = Math.cos(Date.now() * 0.0015 + this.angle) * 8;

                const targetX = width / 2 + point.x * scale + driftX;
                const targetY = height / 2 + point.y * scale + driftY;

                // Orbit gravity style easing movement towards the target heart outline
                this.x += (targetX - this.x) * this.speed;
                this.y += (targetY - this.y) * this.speed;
            }

            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.shadowBlur = this.baseSize * 6;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.baseSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function initCosmos() {
            backgroundStars = [];
            for (let i = 0; i < 150; i++) backgroundStars.push(new BackgroundStar());

            heartParticles = [];
            // 450 distinct stellar dots mapping out the shape of the heart
            for (let i = 0; i < 450; i++) {
                const angle = (i / 450) * Math.PI * 2;
                heartParticles.push(new HeartParticle(angle));
            }
        }

        function animate() {
            ctx.fillStyle = nebulaGradient;
            ctx.fillRect(0, 0, width, height);

            backgroundStars.forEach(s => s.draw());
            heartParticles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
