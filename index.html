<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎉</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 1.5s ease-in-out;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        h1 {
            color: #ff6b6b;
            margin-bottom: 15px;
            font-size: 2.5rem;
        }

        p {
            color: #4a4a4a;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .year-stamp {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #a0aec0;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">🎂</div>
        <h1>Happy Birthday!</h1>
        
        <!-- 📝 EDIT YOUR MESSAGE INSIDE THE P TAGS BELOW EACH YEAR -->
        <p id="birthday-message">
            Hope you have an absolutely amazing day filled with love, laughter, and lots of cake! ✨
        </p>
        
        <!-- This updates automatically so it always looks fresh -->
        <div class="year-stamp">BIRTHDAY EDITION • <span id="current-year"></span></div>
    </div>

    <script>
        // Automatically sets the correct year so you don't have to change it
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
