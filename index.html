<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🌟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            pointer-events: none; /* Lets clicks go through to the animation if needed */
        }
        h1 {
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8), 0 0 40px rgba(255, 107, 107, 0.4);
            margin-bottom: 10px;
            letter-spacing: 2px;
            animation: pulse 2s infinite ease-in-out;
        }
        p {
            color: #ffb3b3;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(255, 179, 179, 0.5);
            max-width: 320px;
            margin: 0 auto;
            line-height: 1.5;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 20px rgba(255, 107, 107, 0.8); }
            50% { transform: scale(1.05); text-shadow: 0 0 35px rgba(255, 107, 107, 1.2); }
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="overlay">
        <h1>Happy Birthday! my Nia</h1>
        <!-- 📝 CHANGING THIS TEXT UPDATES THE CENTER MESSAGE NEXT YEAR -->
        <p id="sub-message">Hope you have an absolutely amazing day! saranghae 🩷✨</p>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Mathematical formula for the heart shape coordinates
        function heartPosition(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
            };
        }

        class TextParticle {
            constructor() {
                this.t = Math.random() * Math.PI * 2;
                const pos = heartPosition(this.t);
                
                // Scale dynamic size of the heart based on screen width
                const scale = Math.min(width, height) / 30; 
                this.targetX = width / 2 + pos.x * scale;
                this.targetY = height / 2 + pos.y * scale;
                
                // Start scattered across the screen
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                this.speed = 0.03 + Math.random() * 0.04;
                this.fontSize = Math.floor(Math.random() * 8) + 8;
                this.text = "Happy Birthday";
                this.opacity = Math.random() * 0.5 + 0.5;
                
                // Variations of neon reds/pinks like the video
                const hues = [350, 355, 0, 10];
                this.color = hues[Math.floor(Math.random() * hues.length)];
            }

            update() {
                // Subtle pulse rhythm over time
                const time = Date.now() * 0.003;
                const pulseScale = 1 + Math.sin(time + this.t * 5) * 0.05;

                const pos = heartPosition(this.t);
                const scale = (Math.min(width, height) / 30) * pulseScale;
                
                this.targetX = width / 2 + pos.x * scale;
                this.targetY = height / 2 + pos.y * scale;

                // Move toward target position (easing effect)
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
            }

            draw() {
                ctx.save();
                ctx.font = `${this.fontSize}px sans-serif`;
                ctx.fillStyle = `hsla(${this.color}, 100%, 65%, ${this.opacity})`;
                ctx.shadowBlur = 12;
                ctx.shadowColor = `hsl(${this.color}, 100%, 50%)`;
                ctx.translate(this.x, this.y);
                // Tilt the text slightly along the curve of the heart
                ctx.rotate(this.t - Math.PI / 2 * (this.x > width / 2 ? 1 : -1) * 0.2);
                ctx.fillText(this.text, 0, 0);
                ctx.restore();
            }
        }

        // Generate hundreds of text elements to shape the heart
        const particles = [];
        const totalParticles = 350; 
        for (let i = 0; i < totalParticles; i++) {
            particles.push(new TextParticle());
        }

        function animate() {
            // Leave a slight trail behind for a smooth glow movement
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
