<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Cosmic Wish | Happy Birthday! ✨</title>
    <!-- Importing premium elegant cursive fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Pure deep void black */
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .interaction-gate {
            position: relative;
            z-index: 3;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .start-btn {
            background: transparent !important;
            -webkit-appearance: none;
            appearance: none;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            padding: 16px 32px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 40px;
            cursor: pointer;
            outline: none;
            box-shadow: none;
            transition: all 0.4s ease;
        }

        .start-btn:hover, .start-btn:active {
            background: rgba(255, 105, 180, 0.1) !important;
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.4);
            border-color: rgba(255, 105, 180, 0.6) !important;
        }

        .overlay {
            position: absolute; /* absolute to prevent pushing layout boundaries */
            z-index: 2;
            text-align: center;
            width: 85%;
            max-width: 420px;
            pointer-events: none;
            transform: translateY(15px); /* Aligns text inside the heart cavity */
        }

        /* Narrative Intro Text Layer */
        .intro-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #ffb74d;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
            opacity: 0;
            transition: opacity 1s ease;
            position: absolute;
            width: 100%;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Main Message Text Block */
        .main-message-box {
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-weight: 400;
            font-size: 2.4rem; 
            letter-spacing: 1px;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ffc0cb, #ffffff, #ff69b4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.4);
        }

        p.message-body {
            font-family: 'Dancing Script', cursive;
            font-weight: 600;
            font-size: 1.45rem;
            line-height: 1.5;
            color: #fff0f5;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
        }
    </style>
</head>
<body>

    <!-- 🎵 Audio Track Element -->
    <audio id="birthdayTrack" preload="auto">
        <source src="audio-1784429183439.mp3" type="audio/mpeg">
    </audio>

    <canvas id="cosmicCanvas"></canvas>

    <div class="interaction-gate" id="gate">
        <button class="start-btn" onclick="startCinematicVision()">Tap to Unveil the Wish</button>
    </div>

    <div class="overlay" id="contentOverlay">
        <div class="intro-text" id="introText"></div>
        <div class="main-message-box" id="mainMessageBox">
            <h1 id="mainTitle"></h1>
            <p class="message-body" id="mainBody"></p>
        </div>
    </div>

    <script>
        const audio = document.getElementById('birthdayTrack');
        const gate = document.getElementById('gate');
        const introText = document.getElementById('introText');
        const mainMessageBox = document.getElementById('mainMessageBox');
        const mainTitle = document.getElementById('mainTitle');
        const mainBody = document.getElementById('mainBody');
        
        let heartState = "off"; // "off", "assemble", "hold", "retract"

        function typeWriter(element, text, speed, callback) {
            let i = 0;
            element.innerHTML = "";
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    setTimeout(callback, 600);
                }
            }
            type();
        }

        function startCinematicVision() {
            gate.style.opacity = '0';
            setTimeout(() => { gate.style.display = 'none'; }, 400);

            audio.currentTime = 24; 
            audio.volume = 0.8;
            audio.play();

            setTimeout(() => {
                introText.style.opacity = '1';
                typeWriter(introText, "From Leisha, to my Nia...", 90, () => {
                    setTimeout(() => {
                        introText.style.opacity = '0';
                        
                        setTimeout(() => {
                            introText.style.display = 'none';
                            heartState = "assemble"; 
                            
                            mainMessageBox.style.display = 'block';
                            mainMessageBox.style.opacity = '1';
                            
                            typeWriter(mainTitle, "Happy Birthday my Nia!", 70, () => {
                                typeWriter(mainBody, "Hope you have an amazing day! Forever grateful for your existence in my life Saranghae", 45, () => {
                                    heartState = "hold"; 
                                    
                                    setTimeout(() => {
                                        heartState = "retract"; 
                                        mainMessageBox.style.opacity = '0'; 
                                        
                                        let fadeOutInterval = setInterval(() => {
                                            if (audio.volume > 0.05) {
                                                audio.volume -= 0.05;
                                            } else {
                                                clearInterval(fadeOutInterval);
                                                audio.pause();
                                            }
                                        }, 60);
                                    }, 5000); 
                                });
                            });
                        }, 1000);
                    }, 1200);
                });
            }, 200);
        }

        // --- VISUAL PHYSICS ENGINE ---
        const canvas = document.getElementById('cosmicCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, backgroundStars = [], heartParticles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initBackgroundStars();
            buildHeartConstellation();
        }

        function getHeartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
            };
        }

        class BackgroundStar {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.0;
                this.opacity = Math.random() * 0.4 + 0.1;
                this.factor = Math.random() * 0.02 + 0.01;
            }
            draw() {
                this.opacity += Math.sin(Date.now() * this.factor) * 0.003;
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.02, this.opacity)})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class HeartParticle {
            constructor(angle) {
                this.angle = angle;
                
                // Controlled radial thickness band
                this.radiusOffset = Math.random() * 20 - 10; 
                this.baseSize = Math.random() * 1.5 + 0.7; 
                this.speed = 0.007 + Math.random() * 0.013;
                
                // --- NEW COSMIC PINK SHADES ---
                // Hot Pink, Deep Rose, Neon Pink, Light Pink, Magenta glow
                const colors = ['#ff69b4', '#ff1493', '#ff66cc', '#f8bbd0', '#ff4081', '#ff80ab'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                this.vx = (Math.random() - 0.5) * 14;
                this.vy = (Math.random() - 0.5) * 14;
                this.alpha = 1.0;
            }

            update() {
                if (heartState === "assemble" || heartState === "hold") {
                    const scale = Math.min(width / 28, height / 36); 
                    const point = getHeartPoint(this.angle);
                    
                    const driftX = Math.sin(Date.now() * 0.0008 + this.angle) * 6;
                    const driftY = Math.cos(Date.now() * 0.0012 + this.angle) * 6;

                    const targetX = width / 2 + point.x * scale + (Math.sin(this.angle) * this.radiusOffset) + driftX;
                    const targetY = height / 2 + point.y * scale + (Math.cos(this.angle) * this.radiusOffset) + driftY;

                    this.x += (targetX - this.x) * this.speed;
                    this.y += (targetY - this.y) * this.speed;
                } 
                else if (heartState === "retract") {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.alpha -= 0.014; 
                    if (this.alpha < 0) this.alpha = 0;
                }
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                
                ctx.shadowBlur = this.baseSize * 10;
                ctx.shadowColor = this.color;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.baseSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function initBackgroundStars() {
            backgroundStars = [];
            for (let i = 0; i < 70; i++) backgroundStars.push(new BackgroundStar());
        }

        function buildHeartConstellation() {
            heartParticles = [];
            for (let i = 0; i < 800; i++) {
                const angle = (i / 800) * Math.PI * 2;
                heartParticles.push(new HeartParticle(angle));
            }
        }

        function animate() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            if (heartState !== "retract" || (heartParticles.length > 0 && heartParticles[0].alpha > 0)) {
                backgroundStars.forEach(s => s.draw());
            }
            
            if (heartState !== "off") {
                heartParticles.forEach(p => {
                    p.update();
                    p.draw();
                });
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
