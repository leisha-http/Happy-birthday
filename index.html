<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Cosmic Wish | Happy Birthday! ✨</title>
    <!-- Importing a beautiful elegant cursive font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Pure pitch black */
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .interaction-gate {
            position: relative;
            z-index: 3;
            text-align: center;
            transition: opacity 1s ease, transform 1s ease;
        }

        .start-btn {
            background: transparent; /* Changed to stay completely hidden in pure pitch black */
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 18px 36px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.9);
            transition: all 0.4s ease;
        }

        .start-btn:hover {
            background: rgba(255, 40, 40, 0.1); /* Subtle crimson flash on hover */
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            border-color: rgba(255, 100, 100, 0.6);
            transform: scale(1.02);
        }

        .overlay {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 90%;
            max-width: 500px;
            pointer-events: none;
            display: none;
            opacity: 0;
            transition: opacity 2.5s ease;
        }

        h1 {
            font-family: 'Great Vibes', cursive; /* Beautiful premium cursive script */
            font-weight: 400;
            font-size: 4rem; 
            letter-spacing: 1px;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ffcdd2, #ffffff, #ff8a80);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(255, 50, 50, 0.4);
        }

        p {
            font-family: 'Dancing Script', cursive; /* Soft matching cursive message */
            font-weight: 600;
            font-size: 1.8rem;
            line-height: 1.4;
            color: #ffebee;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.9);
        }
    </style>
</head>
<body>

    <!-- 🎵 Update 'moonlight-sway.mp3' if you renamed your file in the repo -->
    <audio id="birthdayTrack" preload="auto">
        <source src="moonlight-sway.mp3" type="audio/mpeg">
    </audio>

    <canvas id="cosmicCanvas"></canvas>

    <div class="interaction-gate" id="gate">
        <button class="start-btn" onclick="revealWish()">Tap to Unveil the Wish</button>
    </div>

    <div class="overlay" id="messageContainer">
        <h1>Happy Birthday my Nia!</h1>
        <p id="sub-message">Hope you have an absolutely amazing day! Saranghae</p>
    </div>

    <script>
        const audio = document.getElementById('birthdayTrack');
        const gate = document.getElementById('gate');
        const container = document.getElementById('messageContainer');
        
        let heartActive = false; // Controls when the heart generates

        function revealWish() {
            gate.style.opacity = '0';
            gate.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                gate.style.display = 'none';
                container.style.display = 'block';
                
                // Triggers text fade-in and tells animation engine to build the heart
                setTimeout(() => { container.style.opacity = '1'; }, 50);
                activateHeartParticleSystem(); 

                // Start audio track at exactly 27 seconds
                audio.currentTime = 27;
                audio.volume = 0.8;
                audio.play();

                // Fades out cleanly after 16 seconds (hits exactly at 43 seconds runtime)
                setTimeout(() => {
                    let fadeOutInterval = setInterval(() => {
                        if (audio.volume > 0.05) {
                            audio.volume -= 0.05;
                        } else {
                            clearInterval(fadeOutInterval); // Fixed the bug here! Removed "audio." prefix
                            audio.pause();
                        }
                    }, 50);
                }, 16000); // 16000 milliseconds = 16 full seconds of playback

            }, 500);
        }

        // --- VISUAL ENGINE ---
        const canvas = document.getElementById('cosmicCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, backgroundStars = [], heartParticles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initBackgroundStars();
            if (heartActive) {
                buildHeartConstellation();
            }
        }

        function getHeartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
            };
        }

        class BackgroundStar {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.2;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.factor = Math.random() * 0.02 + 0.01;
            }
            draw() {
                this.opacity += Math.sin(Date.now() * this.factor) * 0.005;
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.05, this.opacity)})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class HeartParticle {
            constructor(angle) {
                this.angle = angle;
                this.baseSize = Math.random() * 1.5 + 0.5;
                
                // --- SLOWED MOTION DESIGN ---
                // Lower values mean a smoother, more cinematic space pull
                this.speed = 0.006 + Math.random() * 0.012;
                
                // Deep Crimson, Ruby Red, Shimmering Dark Rose Red variants
                const colors = ['#ff1744', '#d50000', '#ff5252', '#b71c1c', '#ff8a80'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // Explode particles far out past the display boundaries initially
                this.x = Math.random() * width;
                this.y = Math.random() * height;
            }

            update() {
                const scale = Math.min(width, height) / 28;
                const point = getHeartPoint(this.angle);
                
                // Slow wavy nebula drift
                const driftX = Math.sin(Date.now() * 0.0008 + this.angle) * 7;
                const driftY = Math.cos(Date.now() * 0.0012 + this.angle) * 7;

                const targetX = width / 2 + point.x * scale + driftX;
                const targetY = height / 2 + point.y * scale + driftY;

                // Pull into position smoothly
                this.x += (targetX - this.x) * this.speed;
                this.y += (targetY - this.y) * this.speed;
            }

            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                
                // Intense Crimson Glow
                ctx.shadowBlur = this.baseSize * 9;
                ctx.shadowColor = this.color;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.baseSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function initBackgroundStars() {
            backgroundStars = [];
            for (let i = 0; i < 120; i++) backgroundStars.push(new BackgroundStar());
        }

        function buildHeartConstellation() {
            heartParticles = [];
            for (let i = 0; i < 500; i++) {
                const angle = (i / 500) * Math.PI * 2;
                heartParticles.push(new HeartParticle(angle));
            }
        }

        function activateHeartParticleSystem() {
            heartActive = true;
            buildHeartConstellation();
        }

        function animate() {
            // Pure canvas pitch black fill on every redraw frame
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            backgroundStars.forEach(s => s.draw());
            
            if (heartActive) {
                heartParticles.forEach(p => {
                    p.update();
                    p.draw();
                });
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
